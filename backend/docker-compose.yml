version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music-player-api
    restart: unless-stopped

    environment:
      PORT: 8000

      # USE THE SECRETS!
      # Don't hardcode host/user/pass here.
      # We added DATABASE_URL to Coolify secrets earlier.
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}

      CORS_ORIGINS: "https://api.n8nauto.win"

    # Coolify handles the routing automatically based on the "Domains" field in the UI.
    # We only need to tell it which port to look at.
    expose:
      - "8000"

    labels:
      - "coolify.exposedPort=8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5