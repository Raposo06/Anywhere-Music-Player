version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music-player-api
    restart: unless-stopped

    environment:
      PORT: 8000
      API_BASE_URL: https://api.n8nauto.win


      DB_HOST: ${DB_HOST}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: postgres
      DB_USER: ${DB_USER}
      DB_SCHEMA: musicplayer
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: "https://api.n8nauto.win"

    # Coolify handles the routing automatically based on the "Domains" field in the UI.
    # We only need to tell it which port to look at.
    expose:
      - "8000"
    labels:
      - "coolify.exposedPort=8000"

    networks:
      - coolify
      - default

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  coolify:
    external: true