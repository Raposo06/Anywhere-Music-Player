name: anywhere_music_player
description: A self-hosted music streaming app for Web and Android TV
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State Management
  provider: ^6.1.1

  # HTTP Client
  http: ^1.1.2

  # Audio Player
  just_audio: ^0.9.36

  # Local Storage (JWT tokens)
  shared_preferences: ^2.2.2

  # JSON Serialization
  json_annotation: ^4.9.0

  # Environment Configuration
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - .env
