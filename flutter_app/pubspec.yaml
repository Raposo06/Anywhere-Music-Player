name: anywhere_music_player
description: A self-hosted music streaming app for Web and Android TV
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: any

  # State Management
  provider: any

  # HTTP Client
  http: any

  # Audio Player
  just_audio: ^0.9.34
  just_audio_windows: ^0.2.0
  audio_service: ^0.18.12

  # Local Storage (JWT tokens)
  shared_preferences: any

  # JSON Serialization
  json_annotation: any

  # Environment Configuration
  flutter_dotenv: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  json_serializable: any

flutter:
  uses-material-design: true

  assets:
    - .env
