name: anywhere_music_player
description: A self-hosted music streaming app for Web and Android TV
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: any

  # State Management
  provider: any

  # HTTP Client
  http: any

  # Audio Player
  just_audio: ^0.9.40
  just_audio_windows: ^0.2.1
  audio_service: ^0.18.12
  smtc_windows: ^0.1.3
  windows_taskbar: ^1.1.2

  # Permissions
  permission_handler: any

  # Crypto (MD5 for Subsonic API auth)
  crypto: any

  # Local Storage
  shared_preferences: any

  # Secure credential storage
  flutter_secure_storage: ^9.0.0

  # Window management (desktop title bar)
  window_manager: ^0.4.3

  # Cached network images
  cached_network_image: ^3.3.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # JSON Serialization
  json_annotation: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  build_runner: any
  json_serializable: any
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  windows:
    generate: true
    image_path: "assets/icons/psx.png"
  image_path: "assets/icons/psx.png"
  min_sdk_android: 21